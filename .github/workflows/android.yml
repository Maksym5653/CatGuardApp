name: Build Android APK

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17 (required for Android Gradle Plugin 8.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Cache Gradle dependencies (speeds up subsequent builds)
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Make gradlew executable
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Download TFLite model (EfficientDet-Lite0 from TFHub)
      #    The model must be in assets/ for the app to work.
      #    If you commit the .tflite file directly to the repo, remove this step.
      - name: Download TFLite model
        run: |
          mkdir -p app/src/main/assets
          curl -L "https://storage.googleapis.com/download.tensorflow.org/models/tflite/task_library/object_detection/android/lite-model_efficientdet_lite0_detection_metadata_1.tflite" \
            -o app/src/main/assets/efficientdet_lite0.tflite || \
          echo "WARNING: Could not download TFLite model. Make sure efficientdet_lite0.tflite is in assets/"

      # 6. Build debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 7. Upload APK as a build artifact (available in Actions → Run → Artifacts)
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CatGuard-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      # 8. Create a GitHub Release with the APK on every push to main
      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "CatGuard Build #${{ github.run_number }}"
          body: |
            🐱 **CatGuard Auto-Build**
            
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Build:** #${{ github.run_number }}
            
            ### Installation
            1. Download `app-debug.apk` below
            2. Enable "Install from unknown sources" on your Android device
            3. Transfer APK to phone and install
            
            ### Setup
            - Run the signaling server from `signaling-server/` on a device in your network
            - Update the `serverUrl` in `CameraActivity.kt` and `ViewerActivity.kt`
          draft: false
          prerelease: false
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Optional: build release APK if you have a signing keystore
